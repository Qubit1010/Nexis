                              - generic [ref=e1453]: Marshall Stern
                            - generic [ref=e1455]:
                              - generic [ref=e1457]: As a coach / mentor myself I always suggest when someone is looking for a coach or mentor in the business space to look for one that has been a business owner for a while and that can understand and relate to where you are at. In addition to experience the other really important factor I believe is the connection between the coach and client. So with that said ask around, check out content online to see what resonates and then have a chat with them to see if there is a fit. As for the affordability question some coaches have customizable packages they may fit your budget. It may be more in a group program or something more private. Either way is an investment in yourself and your business. Hope that helps.
                              - generic [ref=e1459]: Hope that helps. I remember when I started my various businesses, how exciting and overwhelming at the beginning it could be. If you want to have a chat, just let me know.
